<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Resumes — ResumeAI</title>
  <meta name="description" content="Manage your AI-generated resumes on ResumeAI dashboard.">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="orbs" aria-hidden="true">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav class="nav scrolled" id="nav">
  <a href="index.html" class="logo">✨ <span class="grad-text">ResumeAI</span></a>
  <div style="display:flex;align-items:center;gap:1rem">
    <div class="user-avatar" id="user-avatar">?</div>
    <span class="user-name" id="user-name">Loading...</span>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
  </div>
</nav>

<main class="dash-main" style="padding-top:80px;min-height:100vh;position:relative;z-index:10">
  <div class="dash-wrap">

    <!-- Welcome Header -->
    <div class="dash-hdr">
      <div>
        <h1 class="dash-title">My <span class="grad-text">Resumes</span></h1>
        <p class="dash-sub" id="dash-sub">Loading your resumes...</p>
      </div>
      <a href="builder.html" class="btn btn-primary">+ Build New Resume</a>
    </div>

    <!-- Stats -->
    <div class="dash-stats">
      <div class="dash-stat glass">
        <div class="dstat-n" id="stat-total">0</div>
        <div class="dstat-l">Resumes Saved</div>
      </div>
      <div class="dash-stat glass">
        <div class="dstat-n grad-text" id="stat-date">—</div>
        <div class="dstat-l">Last Updated</div>
      </div>
      <div class="dash-stat glass">
        <div class="dstat-n" style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">AI</div>
        <div class="dstat-l">AI-Powered</div>
      </div>
    </div>

    <!-- Resumes Grid -->
    <div class="resumes-grid" id="resumes-grid">
      <div class="resume-empty" id="empty-state">
        <div style="font-size:3rem;margin-bottom:1rem">📋</div>
        <h3>No resumes yet</h3>
        <p style="color:var(--text2);margin-bottom:1.5rem">Build your first AI-powered resume in minutes.</p>
        <a href="builder.html" class="btn btn-primary">🚀 Build My First Resume</a>
      </div>
    </div>

  </div>
</main>

<div class="toast-wrap" id="toasts"></div>

<script>
const SUPA_URL = 'https://fcjtdngwgdmokdjctglt.supabase.co';
const SUPA_KEY = 'sb_publishable_DCJ0v-_vROz0wEYH0KNBZQ_ghis05OD';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;

// ======= AUTH GUARD =======
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'auth.html'; return; }
  currentUser = session.user;
  initDashboard();
});

function initDashboard() {
  const meta = currentUser.user_metadata;
  const name = meta?.full_name || meta?.name || currentUser.email.split('@')[0];
  const initials = name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('dash-sub').textContent = `Welcome back, ${name.split(' ')[0]}! 👋`;
  loadResumes();
}

// ======= LOAD RESUMES =======
async function loadResumes() {
  const { data, error } = await sb
    .from('resumes')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  if (error) { toast('Failed to load resumes: ' + error.message, 'error'); return; }

  document.getElementById('stat-total').textContent = data.length;
  if (data.length > 0) {
    const d = new Date(data[0].created_at);
    document.getElementById('stat-date').textContent = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    renderResumes(data);
  }
}

function renderResumes(resumes) {
  const grid = document.getElementById('resumes-grid');
  if (resumes.length === 0) return;
  grid.innerHTML = resumes.map((r, i) => {
    const d = new Date(r.created_at);
    const dateStr = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    const rj = r.resume_json || {};
    return `
    <div class="resume-card glass">
      <div class="rc-top">
        <div class="rc-icon">${getInitials(r.name)}</div>
        <div>
          <div class="rc-name">${r.name || 'Unnamed'}</div>
          <div class="rc-role">${r.role || '—'}</div>
        </div>
        <button class="rm-btn" title="Delete" onclick="deleteResume('${r.id}', this)">✕</button>
      </div>
      <div class="rc-meta">
        <span class="rc-badge">${(rj.techSkills || []).slice(0,3).join(' · ') || 'No skills'}</span>
      </div>
      <div class="rc-date">📅 Saved on ${dateStr}</div>
      <div class="rc-acts">
        <button class="btn btn-sm btn-primary" onclick="openResume(${i})">👁 View</button>
        <button class="btn btn-sm btn-secondary" onclick="rebuildResume(${JSON.stringify(rj).replace(/"/g,'&quot;')})">🔄 Rebuild</button>
      </div>
    </div>`;
  }).join('');

  // Store for modal
  window._resumes = resumes;
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

// ======= DELETE =======
async function deleteResume(id, btn) {
  if (!confirm('Delete this resume? This cannot be undone.')) return;
  const card = btn.closest('.resume-card');
  card.style.opacity = '0.5';
  const { error } = await sb.from('resumes').delete().eq('id', id).eq('user_id', currentUser.id);
  if (error) { card.style.opacity = '1'; toast('Delete failed: ' + error.message, 'error'); }
  else { card.remove(); toast('Resume deleted', 'success'); loadResumes(); }
}

// ======= VIEW RESUME (modal) =======
function openResume(idx) {
  const r = window._resumes[idx];
  const rj = r.resume_json || {};
  const html = buildResumeHTML(rj);
  const modal = document.createElement('div');
  modal.className = 'rdoc-modal';
  modal.innerHTML = `
    <div class="rdoc-overlay" onclick="this.parentNode.remove()"></div>
    <div class="rdoc-wrap">
      <div class="rdoc-toolbar">
        <span style="font-weight:600">📄 ${r.name}'s Resume</span>
        <button class="btn btn-sm btn-ghost" onclick="this.closest('.rdoc-modal').remove()">✕ Close</button>
      </div>
      <div class="rdoc-scroller">${html}</div>
    </div>`;
  document.body.appendChild(modal);
}

// ======= REBUILD =======
function rebuildResume(data) {
  sessionStorage.setItem('resume_prefill', typeof data === 'string' ? data : JSON.stringify(data));
  window.location.href = 'builder.html';
}

// ======= LOGOUT =======
async function logout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// ======= Build resume HTML (same as builder.js) =======
function buildResumeHTML(d) {
  let html = `<div class="rdoc" id="resume-doc">`;
  html += `<div class="rname">${d.name || 'Your Name'}</div>`;
  const contact = [];
  if (d.email) contact.push(`<a href="mailto:${d.email}">${d.email}</a>`);
  if (d.phone) contact.push(d.phone);
  if (d.location) contact.push(d.location);
  if (d.linkedin) contact.push(`<a href="https://${d.linkedin.replace(/^https?:\/\//,'')}" target="_blank">LinkedIn</a>`);
  if (d.github) contact.push(`<a href="https://${d.github.replace(/^https?:\/\//,'')}" target="_blank">GitHub</a>`);
  if (contact.length) html += `<div class="rcontact">${contact.join(' | ')}</div>`;
  html += `<hr>`;

  if (d.summary) html += `<div class="rtitle">Professional Summary</div><div class="rsummary">${d.summary}</div>`;

  const exps = d.experience || [];
  if (exps.length) {
    html += `<div class="rtitle">Work Experience</div>`;
    exps.forEach(e => {
      html += `<div class="rentry"><div class="rehdr"><span class="rco">${e.company}</span><span class="rdate">${e.start||''}${e.end?' – '+e.end:''}</span></div><div class="rrole">${e.role}</div>`;
      if (e.bullets?.length) html += `<ul>${e.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
      html += `</div>`;
    });
  }

  const edus = d.education || [];
  if (edus.length) {
    html += `<div class="rtitle">Education</div>`;
    edus.forEach(e => {
      html += `<div class="rentry"><div class="rehdr"><span class="rco">${e.university}</span><span class="rdate">${e.year||''}</span></div><div class="rrole">${e.degree||''}${e.major?' in '+e.major:''}${e.gpa?' | GPA: '+e.gpa:''}</div></div>`;
    });
  }

  const projs = d.projects || [];
  if (projs.length) {
    html += `<div class="rtitle">Projects</div>`;
    projs.forEach(p => {
      html += `<div class="rentry"><div class="rehdr"><span class="rco">${p.name}</span>${p.tech?`<span class="rdate">${p.tech}</span>`:''}</div>`;
      if (p.bullets?.length) html += `<ul>${p.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
      html += `</div>`;
    });
  }

  if (d.techSkills?.length || d.softSkills?.length) {
    html += `<div class="rtitle">Skills</div><div class="rskills">`;
    if (d.techSkills?.length) html += `<div class="rskrow"><span class="rsklbl">Technical:</span><span class="rskval">${d.techSkills.join(', ')}</span></div>`;
    if (d.softSkills?.length) html += `<div class="rskrow"><span class="rsklbl">Soft Skills:</span><span class="rskval">${d.softSkills.join(', ')}</span></div>`;
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

// ======= TOAST =======
function toast(msg, type = 'success') {
  const wrap = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `${type==='success'?'✅':'❌'} ${msg}`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
</body>
</html>

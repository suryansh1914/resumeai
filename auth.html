<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ResumeAI</title>
  <meta name="description" content="Sign in or create your ResumeAI account to save and manage your AI-generated resumes.">
  <link rel="canonical" href="https://suryaai-resume-builder.vercel.app/auth.html" />
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<div class="orbs" aria-hidden="true">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav class="nav" id="nav">
  <a href="index.html" class="logo">✨ <span class="grad-text">ResumeAI</span></a>
  <ul class="nav-links">
    <li><a href="index.html">← Back to Home</a></li>
  </ul>
</nav>

<main class="auth-main">
  <div class="auth-card glass">

    <!-- Logo & heading -->
    <div class="auth-logo">✨</div>
    <h1 class="auth-title"><span class="grad-text">Welcome Back</span></h1>
    <p class="auth-sub" id="auth-subtitle">Sign in to access your resumes</p>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Error / success banner -->
    <div class="auth-alert" id="auth-alert" style="display:none"></div>

    <!-- Social OAuth -->
    <div style="display:flex; flex-direction:column; gap:0.5rem">
      <button class="btn-google" onclick="loginWithOAuth('google')" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="btn-google" style="background:#24292e; color:white; border:1px solid #24292e;" onclick="loginWithOAuth('github')" id="github-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        Continue with GitHub
      </button>
    </div>

    <div class="auth-divider"><span>or continue with email</span></div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="fg">
        <label class="label">Email Address</label>
        <input type="email" class="inp" id="login-email" placeholder="you@email.com" required autocomplete="email">
      </div>
      <div class="fg" style="margin-top:.9rem">
        <label class="label">Password</label>
        <div class="pass-wrap">
          <input type="password" class="inp" id="login-pass" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="pass-eye" onclick="togglePass('login-pass', this)">👁</button>
        </div>
      </div>
      <div style="text-align:right;margin-top:.5rem">
        <button type="button" class="link-btn" onclick="showForgot()">Forgot password?</button>
      </div>
      <button type="submit" class="btn btn-primary auth-submit" id="login-btn">
        <span id="login-btn-text">Sign In →</span>
      </button>
    </form>

    <!-- Signup Form -->
    <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">
      <div class="fg">
        <label class="label">Full Name</label>
        <input type="text" class="inp" id="signup-name" placeholder="Rahul Sharma" required autocomplete="name">
      </div>
      <div class="fg" style="margin-top:.9rem">
        <label class="label">Email Address</label>
        <input type="email" class="inp" id="signup-email" placeholder="you@email.com" required autocomplete="email">
      </div>
      <div class="fg" style="margin-top:.9rem">
        <label class="label">Password</label>
        <div class="pass-wrap">
          <input type="password" class="inp" id="signup-pass" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
          <button type="button" class="pass-eye" onclick="togglePass('signup-pass', this)">👁</button>
        </div>
      </div>
      <div class="fg" style="margin-top:.9rem">
        <label class="label">Confirm Password</label>
        <div class="pass-wrap">
          <input type="password" class="inp" id="signup-pass2" placeholder="Re-enter password" required autocomplete="new-password">
          <button type="button" class="pass-eye" onclick="togglePass('signup-pass2', this)">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary auth-submit" id="signup-btn">
        <span id="signup-btn-text">Create Account →</span>
      </button>
    </form>

    <!-- Forgot Password Form -->
    <form id="forgot-form" style="display:none" onsubmit="handleForgot(event)">
      <p style="color:var(--text2);font-size:.88rem;margin-bottom:1.25rem">Enter your email and we'll send you a reset link.</p>
      <div class="fg">
        <label class="label">Email Address</label>
        <input type="email" class="inp" id="forgot-email" placeholder="you@email.com" required>
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Send Reset Link</button>
      <button type="button" class="link-btn" style="display:block;text-align:center;margin-top:.75rem" onclick="hideForgot()">← Back to Sign In</button>
    </form>

  </div>
</main>

<div class="toast-wrap" id="toasts"></div>

<script>
// ======= SUPABASE INIT =======
const SUPA_URL = 'https://fcjtdngwgdmokdjctglt.supabase.co';
  const SUPA_KEY = 'sb_publishable_DCJ0v-_vROz0wEYH0KNBZQ_ghis05OD';
  const cookieStorage = {
    getItem: (k) => { const v = document.cookie.split('; ').find(r => r.startsWith(k+'=')); return v ? decodeURIComponent(v.split('=')[1]) : null; },
    setItem: (k, v) => document.cookie = `${k}=${encodeURIComponent(v)}; path=/; max-age=31536000; SameSite=Lax; Secure`,
    removeItem: (k) => document.cookie = `${k}=; path=/; max-age=0; SameSite=Lax; Secure`
  };
  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, { auth: { storage: cookieStorage } });

// If already logged in, redirect
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'dashboard.html';
});

// ======= TABS =======
let activeTab = 'login';
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('login-form').style.display   = tab === 'login'  ? 'block' : 'none';
  document.getElementById('signup-form').style.display  = tab === 'signup' ? 'block' : 'none';
  document.getElementById('forgot-form').style.display  = 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('auth-subtitle').textContent = tab === 'login'
    ? 'Sign in to access your resumes'
    : 'Create a free account in seconds';
  clearAlert();
}

// ======= OAUTH =======
async function loginWithOAuth(provider) {
  const btn = document.getElementById(provider + '-btn');
  btn.disabled = true; btn.textContent = 'Redirecting...';
  const { error } = await sb.auth.signInWithOAuth({
    provider: provider,
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if (error) { 
    showAlert(error.message, 'error'); 
    btn.disabled = false; 
    btn.textContent = 'Failed binding. Try again.'; 
  }
}

// ======= LOGIN =======
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  setLoading('login-btn', 'login-btn-text', true, 'Signing in...');
  clearAlert();

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showAlert(error.message, 'error');
    setLoading('login-btn', 'login-btn-text', false, 'Sign In →');
  } else {
    showAlert('Login successful! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  }
}

// ======= SIGNUP =======
async function handleSignup(e) {
  e.preventDefault();
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-pass').value;
  const pass2 = document.getElementById('signup-pass2').value;

  if (pass !== pass2) { showAlert('Passwords do not match!', 'error'); return; }
  setLoading('signup-btn', 'signup-btn-text', true, 'Creating account...');
  clearAlert();

  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name } }
  });

  if (error) {
    showAlert(error.message, 'error');
    setLoading('signup-btn', 'signup-btn-text', false, 'Create Account →');
  } else if (data.user && !data.session) {
    showAlert('✅ Check your email to confirm your account!', 'success');
    setLoading('signup-btn', 'signup-btn-text', false, 'Create Account →');
  } else {
    showAlert('Account created! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  }
}

// ======= FORGOT PASSWORD =======
function showForgot() {
  document.getElementById('login-form').style.display  = 'none';
  document.getElementById('signup-form').style.display = 'none';
  document.getElementById('forgot-form').style.display = 'block';
  document.getElementById('auth-subtitle').textContent = 'Reset your password';
  clearAlert();
}
function hideForgot() { switchTab('login'); }

async function handleForgot(e) {
  e.preventDefault();
  const email = document.getElementById('forgot-email').value.trim();
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth.html'
  });
  if (error) showAlert(error.message, 'error');
  else showAlert('✅ Reset link sent! Check your inbox.', 'success');
}

// ======= HELPERS =======
function setLoading(btnId, textId, loading, text) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(textId).textContent = text;
}
function showAlert(msg, type) {
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.className = 'auth-alert ' + type;
  el.style.display = 'block';
}
function clearAlert() {
  const el = document.getElementById('auth-alert');
  el.style.display = 'none';
  el.textContent = '';
}
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

const nav = document.getElementById('nav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50));
</script>
</body>
</html>
